<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Calculator‑App</title>
  <!-- Erklärung: Der Taschenrechner ist Teil des Portfolios von Mohammad Eldirani. -->
  <link rel="stylesheet" href="style.css" />
  <!-- Google Fonts für eine konsistente Typografie -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap"
    rel="stylesheet"
  />
</head>
<body>
  <div class="calc-container">
    <h1>🧮&nbsp;Rechner</h1>
    <!-- Das Display zeigt den aktuellen Ausdruck und das Ergebnis an -->
    <input type="text" id="display" readonly />
    <div class="buttons">
      <!-- Erste Zeile: Clear, Backspace, Prozent, Division -->
      <button class="btn clear" onclick="clearDisplay()">C</button>
      <button class="btn operator" onclick="backspace()">⌫</button>
      <button class="btn operator" onclick="append('%')">%</button>
      <button class="btn operator" onclick="append('/')">÷</button>
      <!-- Zweite Zeile: 7,8,9,Multiplikation -->
      <button class="btn" onclick="append('7')">7</button>
      <button class="btn" onclick="append('8')">8</button>
      <button class="btn" onclick="append('9')">9</button>
      <button class="btn operator" onclick="append('*')">×</button>
      <!-- Dritte Zeile: 4,5,6,Subtraktion -->
      <button class="btn" onclick="append('4')">4</button>
      <button class="btn" onclick="append('5')">5</button>
      <button class="btn" onclick="append('6')">6</button>
      <button class="btn operator" onclick="append('-')">−</button>
      <!-- Vierte Zeile: 1,2,3,Addition -->
      <button class="btn" onclick="append('1')">1</button>
      <button class="btn" onclick="append('2')">2</button>
      <button class="btn" onclick="append('3')">3</button>
      <button class="btn operator" onclick="append('+')">+</button>
      <!-- Letzte Zeile: 0, Punkt, Gleich -->
      <button class="btn" onclick="append('0')">0</button>
      <button class="btn" onclick="append('.')">.</button>
      <button class="btn equal" onclick="calculate()">=</button>
    </div>
  </div>
  <script src="script.js"></script>
</body>
</html>
